<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Live 3D Exhibition</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@300;400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'DM Mono',monospace;color:#e8e4dc;cursor:none;}
#canvas{display:block;width:100vw;height:100vh;}

/* Crosshair */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;pointer-events:none;z-index:10;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(212,169,106,0.7);}
#crosshair::before{width:1px;height:100%;left:50%;transform:translateX(-50%);}
#crosshair::after{width:100%;height:1px;top:50%;transform:translateY(-50%);}

/* Top bar */
#topbar{position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 2rem;
  background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);}
#logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:0.3em;color:#d4a96a;}
#status-bar{display:flex;align-items:center;gap:1.5rem;}
#live-dot{width:6px;height:6px;border-radius:50%;background:#4cff91;box-shadow:0 0 6px #4cff91;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
#visitor-count{font-size:0.55rem;letter-spacing:0.2em;color:rgba(232,228,220,0.4);}
#my-name{font-size:0.55rem;letter-spacing:0.15em;color:rgba(212,169,106,0.5);}
#conn-status{font-size:0.5rem;letter-spacing:0.2em;color:rgba(232,228,220,0.3);}

/* Controls hint */
#controls-hint{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;gap:1.2rem;align-items:center;
  background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.07);
  padding:0.55rem 1.2rem;border-radius:2px;backdrop-filter:blur(8px);
  transition:opacity 0.8s;}
#controls-hint.fade{opacity:0;}
.ctrl-group{display:flex;align-items:center;gap:0.3rem;font-size:0.5rem;color:rgba(232,228,220,0.4);letter-spacing:0.08em;}
.ctrl-key{display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 4px;border:1px solid rgba(255,255,255,0.18);
  border-radius:3px;font-size:0.5rem;color:rgba(232,228,220,0.55);}

/* Info panel (poster hover) */
#info-panel{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);z-index:20;
  background:rgba(10,9,14,0.9);border:1px solid rgba(212,169,106,0.3);
  padding:1rem 1.6rem;min-width:260px;max-width:320px;
  opacity:0;transition:opacity 0.35s;pointer-events:none;
  backdrop-filter:blur(12px);text-align:center;}
#info-panel.visible{opacity:1;}
#info-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;margin-bottom:0.2rem;}
#info-artist{font-size:0.52rem;letter-spacing:0.28em;text-transform:uppercase;color:#d4a96a;margin-bottom:0.5rem;}
#info-desc{font-size:0.58rem;line-height:1.85;color:rgba(232,228,220,0.5);}
#info-action{margin-top:0.6rem;font-size:0.5rem;letter-spacing:0.2em;color:rgba(212,169,106,0.4);}

/* Visitors panel */
#visitors-panel{position:fixed;top:4.5rem;right:1.5rem;z-index:20;
  background:rgba(8,7,16,0.82);border:1px solid rgba(255,255,255,0.07);
  padding:0.8rem;min-width:170px;backdrop-filter:blur(8px);border-radius:2px;}
#visitors-title{font-size:0.48rem;letter-spacing:0.35em;text-transform:uppercase;
  color:rgba(232,228,220,0.25);margin-bottom:0.6rem;}
#visitors-list{display:flex;flex-direction:column;gap:0.35rem;}
.visitor-row{display:flex;align-items:center;gap:0.5rem;}
.visitor-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.visitor-name{font-size:0.5rem;letter-spacing:0.05em;color:rgba(232,228,220,0.45);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.visitor-name.me{color:rgba(212,169,106,0.7);}
.visitor-status{font-size:0.42rem;color:rgba(232,228,220,0.2);margin-left:auto;}

/* Chat */
#chat-container{position:fixed;bottom:1.5rem;left:1.5rem;z-index:20;width:280px;}
#chat-log{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:0.5rem;
  max-height:180px;overflow:hidden;}
.chat-msg{background:rgba(8,7,16,0.75);border-left:2px solid #d4a96a;
  padding:0.35rem 0.6rem;backdrop-filter:blur(6px);
  animation:slide-in 0.3s ease;}
@keyframes slide-in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.chat-msg.system{border-left-color:rgba(255,255,255,0.15);}
.chat-sender{font-size:0.45rem;letter-spacing:0.15em;margin-bottom:0.15rem;}
.chat-text{font-size:0.55rem;line-height:1.6;color:rgba(232,228,220,0.7);}
#chat-input-wrap{display:flex;gap:0.4rem;opacity:0;transition:opacity 0.3s;}
#chat-input-wrap.visible{opacity:1;}
#chat-input{flex:1;background:rgba(8,7,16,0.85);border:1px solid rgba(255,255,255,0.1);
  color:#e8e4dc;font-family:'DM Mono',monospace;font-size:0.6rem;
  padding:0.45rem 0.7rem;border-radius:2px;outline:none;
  transition:border-color 0.3s;}
#chat-input:focus{border-color:rgba(212,169,106,0.5);}
#chat-send{background:rgba(212,169,106,0.15);border:1px solid rgba(212,169,106,0.3);
  color:#d4a96a;font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.1em;
  padding:0.45rem 0.7rem;cursor:pointer;border-radius:2px;
  transition:background 0.2s;}
#chat-send:hover{background:rgba(212,169,106,0.25);}
#chat-hint{font-size:0.48rem;letter-spacing:0.12em;color:rgba(232,228,220,0.2);
  text-align:center;padding:0.3rem 0;}

/* Minimap */
#minimap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:20;
  width:90px;height:90px;border:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);}
#minimapCanvas{width:100%;height:100%;}

/* Lightbox */
#lightbox{position:fixed;inset:0;z-index:60;
  background:rgba(5,4,10,0.95);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.4s;
  backdrop-filter:blur(12px);}
#lightbox.active{opacity:1;pointer-events:all;}
#lb-inner{max-width:400px;width:88%;text-align:center;}
#lb-art{width:100%;aspect-ratio:2/3;border:1px solid rgba(212,169,106,0.2);margin-bottom:1.3rem;overflow:hidden;}
#lb-art canvas{width:100%;height:100%;}
#lb-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;margin-bottom:0.25rem;}
#lb-artist{font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:#d4a96a;margin-bottom:0.7rem;}
#lb-desc-text{font-size:0.6rem;line-height:1.9;color:rgba(232,228,220,0.5);}
#lb-viewers{margin-top:0.6rem;font-size:0.5rem;letter-spacing:0.15em;color:rgba(212,169,106,0.35);}
#lb-close{margin-top:1.2rem;background:none;border:1px solid rgba(255,255,255,0.15);
  color:rgba(232,228,220,0.5);padding:0.45rem 1.4rem;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;border-radius:2px;
  transition:border-color 0.3s;}
#lb-close:hover{border-color:#d4a96a;color:#d4a96a;}

/* Start screen */
#start-overlay{position:fixed;inset:0;z-index:80;
  background:rgba(5,4,10,0.98);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.2rem;text-align:center;padding:2rem;
  transition:opacity 0.8s;}
#start-overlay.gone{opacity:0;pointer-events:none;}
#start-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,7vw,5.5rem);
  font-weight:300;line-height:0.95;}
#start-title em{font-style:italic;color:#d4a96a;}
#start-sub{font-size:0.62rem;letter-spacing:0.15em;color:rgba(232,228,220,0.35);
  max-width:360px;line-height:2.1;}
#name-input{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);
  color:#e8e4dc;font-family:'DM Mono',monospace;font-size:0.7rem;
  padding:0.7rem 1.2rem;text-align:center;outline:none;border-radius:2px;width:240px;
  transition:border-color 0.3s;letter-spacing:0.1em;}
#name-input:focus{border-color:rgba(212,169,106,0.5);}
#start-btn{padding:0.85rem 2.2rem;background:#d4a96a;color:#0a0a0f;
  font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;
  border:none;cursor:pointer;border-radius:2px;transition:background 0.3s;}
#start-btn:hover{background:#c8b08a;}
.start-note{font-size:0.5rem;letter-spacing:0.15em;color:rgba(232,228,220,0.2);}

/* Name labels above avatars are rendered in Three.js / CSS2D alternative = canvas sprite */
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="crosshair"></div>

<!-- HUD -->
<div id="topbar">
  <div id="logo">NEXUS <span style="font-size:0.45rem;letter-spacing:0.1em;color:rgba(212,169,106,0.4);font-family:'DM Mono',monospace">LIVE</span></div>
  <div id="status-bar">
    <div id="live-dot"></div>
    <div id="visitor-count">— online</div>
    <div id="my-name"></div>
  </div>
  <div id="conn-status">connecting…</div>
</div>

<div id="controls-hint">
  <div class="ctrl-group"><span class="ctrl-key">W</span><span class="ctrl-key">A</span><span class="ctrl-key">S</span><span class="ctrl-key">D</span> move</div>
  <div class="ctrl-group">mouse look</div>
  <div class="ctrl-group"><span class="ctrl-key">E</span> view art</div>
  <div class="ctrl-group"><span class="ctrl-key">T</span> chat</div>
  <div class="ctrl-group"><span class="ctrl-key">ESC</span> unlock</div>
</div>

<div id="info-panel">
  <div id="info-title">—</div>
  <div id="info-artist">—</div>
  <div id="info-desc">—</div>
  <div id="info-action">[ E ] to view</div>
</div>

<div id="visitors-panel">
  <div id="visitors-title">In the gallery</div>
  <div id="visitors-list"></div>
</div>

<div id="chat-container">
  <div id="chat-log"></div>
  <div id="chat-hint">[ T ] to chat</div>
  <div id="chat-input-wrap">
    <input id="chat-input" maxlength="120" placeholder="Say something…">
    <button id="chat-send">Send</button>
  </div>
</div>

<div id="minimap"><canvas id="minimapCanvas"></canvas></div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lb-inner">
    <div id="lb-art"><canvas id="lbCanvas"></canvas></div>
    <div id="lb-title"></div>
    <div id="lb-artist"></div>
    <div id="lb-desc-text"></div>
    <div id="lb-viewers"></div>
    <button id="lb-close">✕  Close</button>
  </div>
</div>

<!-- Start -->
<div id="start-overlay">
  <div id="start-title">A space for<br><em>radical</em><br>imagination</div>
  <div id="start-sub">A live, multiplayer 3D gallery. Walk alongside other visitors in real time.</div>
  <input id="name-input" maxlength="24" placeholder="Your name (optional)">
  <button id="start-btn">Enter Gallery →</button>
  <div class="start-note">WASD · Mouse · E to view · T to chat</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════
//  RENDERER + SCENE
// ═══════════════════════════════════════
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06050d, 0.042);
scene.background = new THREE.Color(0x06050d);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 1.7, 6);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function mat(color,rough=0.9,metal=0){
  return new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal});
}

// ═══════════════════════════════════════
//  ROOM
// ═══════════════════════════════════════
const RW=14, RH=4.5, RD=20;

const floor=new THREE.Mesh(new THREE.PlaneGeometry(RW,RD), new THREE.MeshStandardMaterial({color:0x0d0c14,roughness:0.95,metalness:0.1}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
scene.add(new THREE.GridHelper(RD,20,0x1a1830,0x100f18));

const ceil=new THREE.Mesh(new THREE.PlaneGeometry(RW,RD),mat(0x0a0912,0.98));
ceil.rotation.x=Math.PI/2; ceil.position.y=RH; scene.add(ceil);

function wall(w,h,x,y,z,ry,c=0x100f1a){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshStandardMaterial({color:c,roughness:0.92,metalness:0.02}));
  m.position.set(x,y,z); m.rotation.y=ry; m.receiveShadow=true; scene.add(m); return m;
}
wall(RW,RH,0,RH/2,-RD/2,0,0x0e0d18);
wall(RW,RH,0,RH/2, RD/2,Math.PI,0x0e0d18);
wall(RD,RH,-RW/2,RH/2,0,Math.PI/2,0x0c0b16);
wall(RD,RH, RW/2,RH/2,0,-Math.PI/2,0x0c0b16);

function skirt(w,x,z,ry){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.12,0.05),mat(0x1a1830,0.8,0.2));
  m.position.set(x,0.06,z); m.rotation.y=ry; scene.add(m);
}
skirt(RW,0,-RD/2+0.025,0); skirt(RW,0,RD/2-0.025,Math.PI);
skirt(RD,-RW/2+0.025,0,Math.PI/2); skirt(RD,RW/2-0.025,0,-Math.PI/2);

function crown(w,x,z,ry){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.08,0.06),mat(0x1a1830,0.7,0.3));
  m.position.set(x,RH-0.04,z); m.rotation.y=ry; scene.add(m);
}
crown(RW,0,-RD/2+0.03,0); crown(RW,0,RD/2-0.03,Math.PI);
crown(RD,-RW/2+0.03,0,Math.PI/2); crown(RD,RW/2-0.03,0,-Math.PI/2);

// ═══════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════
scene.add(new THREE.AmbientLight(0x0a0820,0.8));

function spotlight(x,z,tx,tz,intensity=3){
  const l=new THREE.SpotLight(0xffd090,intensity,12,Math.PI/7,0.3,1.5);
  l.position.set(x,RH-0.1,z); l.castShadow=true; l.shadow.mapSize.set(256,256);
  const t=new THREE.Object3D(); t.position.set(tx,1.5,tz); scene.add(t); l.target=t; scene.add(l);
  const fix=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.08,0.18,8),mat(0x222030,0.5,0.8));
  fix.position.set(x,RH-0.09,z); scene.add(fix);
}
[-4,-1.5,1.5,4].forEach(x=>spotlight(x,-RD/2+1,x,-RD/2+0.1));
spotlight(-RW/2+1,-4,-RW/2+0.1,-4); spotlight(-RW/2+1,0,-RW/2+0.1,0);
spotlight(RW/2-1,-4, RW/2-0.1,-4); spotlight(RW/2-1,0,  RW/2-0.1,0);
[[-5,RH-0.5,-8],[-5,RH-0.5,2],[5,RH-0.5,-8],[5,RH-0.5,2]].forEach(([x,y,z])=>{
  const l=new THREE.PointLight(0x1a1540,0.4,10,2); l.position.set(x,y,z); scene.add(l);
});

// Pillars
function pillar(x,z){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,RH,8),mat(0x16152a,0.8,0.2));
  m.position.set(x,RH/2,z); m.castShadow=true; scene.add(m);
  const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.12,0.1,8),mat(0x1e1c30,0.6,0.4));
  cap.position.set(x,RH-0.05,z); scene.add(cap);
}
pillar(-RW/2+0.5,-6); pillar(-RW/2+0.5,6);
pillar( RW/2-0.5,-6); pillar( RW/2-0.5,6);

// Bench
const bench=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.5,0.5),mat(0x1a1828,0.8,0.2));
bench.position.set(0,0.25,2); bench.castShadow=true; scene.add(bench);

// ═══════════════════════════════════════
//  ARTWORK GENERATORS
// ═══════════════════════════════════════
function mkCanvas(fn,w=512,h=768){const c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);return c;}

function art1(ctx,w,h){
  ctx.fillStyle='#12082a';ctx.fillRect(0,0,w,h);
  const g=ctx.createRadialGradient(w/2,h*.4,20,w/2,h*.4,w*.8);
  g.addColorStop(0,'rgba(120,80,200,0.5)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(200,176,138,0.3)';ctx.lineWidth=1;
  for(let i=0;i<16;i++){ctx.beginPath();ctx.arc(w/2,h*.42,30+i*22,0,Math.PI*2);ctx.stroke();}
  for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(w/2,h*.42);ctx.lineTo(w/2+Math.cos(a)*380,h*.42+Math.sin(a)*380);ctx.strokeStyle=`rgba(180,140,220,0.08)`;ctx.stroke();}
  ctx.fillStyle='#c8b08a';ctx.beginPath();ctx.arc(w/2,h*.42,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(200,176,138,0.9)';ctx.font='bold 18px serif';ctx.textAlign='center';ctx.fillText('MERIDIAN',w/2,h*.85);
  ctx.fillStyle='rgba(180,150,100,0.5)';ctx.font='11px monospace';ctx.fillText('SELIN YILDIZ  ·  2024',w/2,h*.9);
}
function art2(ctx,w,h){
  ctx.fillStyle='#0a1520';ctx.fillRect(0,0,w,h);
  for(let i=0;i<30;i++){ctx.beginPath();ctx.strokeStyle=`rgba(100,180,220,${.04+i*.005})`;ctx.lineWidth=0.8;const y=i*(h/28);ctx.moveTo(0,y);for(let x=0;x<w;x+=4){ctx.lineTo(x,y+Math.sin(x*.015+i*.5)*25*Math.sin(i*.3)+Math.sin(x*.008+i)*15);}ctx.stroke();}
  ctx.strokeStyle='rgba(100,180,220,0.4)';ctx.lineWidth=0.5;ctx.strokeRect(w*.15,h*.2,w*.7,h*.6);
  ctx.fillStyle='rgba(200,220,232,0.85)';ctx.font='bold 18px serif';ctx.textAlign='center';ctx.fillText('DEEP STRUCTURE',w/2,h*.87);
  ctx.fillStyle='rgba(138,180,200,0.5)';ctx.font='11px monospace';ctx.fillText('KAI ODUYA  ·  2023',w/2,h*.92);
}
function art3(ctx,w,h){
  ctx.fillStyle='#0f0e06';ctx.fillRect(0,0,w,h);
  for(let i=0;i<20;i++){ctx.beginPath();ctx.strokeStyle=`rgba(212,190,100,${.04+i*.006})`;ctx.lineWidth=1.2;const y=i*(h/18);ctx.moveTo(0,y);for(let x=0;x<w;x+=6){ctx.lineTo(x,y+Math.sin(x*.012+i*.7)*18*Math.cos(i*.25));}ctx.stroke();}
  ctx.beginPath();ctx.arc(w/2,h*.45,40,0,Math.PI*2);ctx.strokeStyle='rgba(212,169,106,0.25)';ctx.lineWidth=0.8;ctx.stroke();
  ctx.fillStyle='rgba(220,195,130,0.85)';ctx.font='bold 18px serif';ctx.textAlign='center';ctx.fillText('SILT & CURRENT',w/2,h*.87);
  ctx.fillStyle='rgba(180,155,90,0.5)';ctx.font='11px monospace';ctx.fillText('MARA CHEN  ·  2024',w/2,h*.92);
}
function art4(ctx,w,h){
  ctx.fillStyle='#060a06';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(60,160,90,0.12)';ctx.lineWidth=0.5;
  for(let i=0;i<32;i++){ctx.beginPath();ctx.moveTo(i*(w/30),0);ctx.lineTo(i*(w/30),h);ctx.stroke();}
  for(let i=0;i<48;i++){ctx.beginPath();ctx.moveTo(0,i*(h/44));ctx.lineTo(w,i*(h/44));ctx.stroke();}
  for(let i=0;i<120;i++){const x=Math.random()*w,y=Math.random()*h;ctx.fillStyle=`rgba(80,200,120,${Math.random()*.6+.1})`;ctx.beginPath();ctx.arc(x,y,Math.random()*2+.5,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='rgba(100,220,140,0.85)';ctx.font='bold 18px serif';ctx.textAlign='center';ctx.fillText('FIELD NOTES',w/2,h*.87);
  ctx.fillStyle='rgba(80,180,100,0.5)';ctx.font='11px monospace';ctx.fillText('ANYA REEVES  ·  2024',w/2,h*.92);
}
function art5(ctx,w,h){
  ctx.fillStyle='#1a1510';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(212,169,106,0.15)';ctx.lineWidth=0.5;
  for(let i=1;i<10;i++){ctx.beginPath();ctx.moveTo(w*.1,h*.1+i*(h*.07));ctx.lineTo(w*.9,h*.1+i*(h*.07));ctx.stroke();}
  const g=ctx.createLinearGradient(0,h*.2,w,h*.8);
  g.addColorStop(0,'rgba(180,130,60,0.3)');g.addColorStop(1,'rgba(80,60,20,0.1)');
  ctx.fillStyle=g;ctx.fillRect(w*.2,h*.15,w*.6,h*.7);
  ctx.strokeStyle='rgba(212,169,106,0.4)';ctx.lineWidth=1;ctx.strokeRect(w*.2,h*.15,w*.6,h*.7);
  ctx.fillStyle='rgba(220,185,120,0.9)';ctx.font='bold 18px serif';ctx.textAlign='center';ctx.fillText('THRESHOLD',w/2,h*.87);
  ctx.fillStyle='rgba(180,145,90,0.5)';ctx.font='11px monospace';ctx.fillText('LEON VOSS  ·  2023',w/2,h*.92);
}

function posterMesh(artCanvas,pw,ph){
  return new THREE.Mesh(new THREE.PlaneGeometry(pw,ph),new THREE.MeshStandardMaterial({map:new THREE.CanvasTexture(artCanvas),roughness:0.6,metalness:0.05}));
}

function makeFrame(pw,ph){
  const g=new THREE.Group(),b=0.06,fm=mat(0x2a2535,0.4,0.6);
  [[pw+b*2,b,0,ph/2+b/2],[pw+b*2,b,0,-ph/2-b/2],[b,ph,-pw/2-b/2,0],[b,ph,pw/2+b/2,0]].forEach(([w,h,x,y])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.04),fm);m.position.set(x,y,0.01);g.add(m);
  });
  return g;
}

function wallSpotAt(x,y,z,ry){
  const l=new THREE.SpotLight(0xffe0a0,2.5,6,Math.PI/9,0.4,2);
  l.position.set(x+Math.sin(ry)*.3,y+.8,z+Math.cos(ry)*.3);
  const t=new THREE.Object3D();t.position.set(x,y,z);scene.add(t);l.target=t;scene.add(l);
}

const PW=1.1,PH=1.65;
const placements=[
  [-4,  2.0,-RD/2+.06,0,         0],
  [-1.5,2.0,-RD/2+.06,0,         1],
  [ 1.5,2.0,-RD/2+.06,0,         2],
  [ 4,  2.0,-RD/2+.06,0,         null],
  [-RW/2+.06,2.0,-4,Math.PI/2,   3],
  [-RW/2+.06,2.0, 0,Math.PI/2,   null],
  [-RW/2+.06,2.0, 4,Math.PI/2,   null],
  [ RW/2-.06,2.0,-4,-Math.PI/2,  4],
  [ RW/2-.06,2.0, 0,-Math.PI/2,  null],
  [ RW/2-.06,2.0, 4,-Math.PI/2,  null],
];

const interactiveMeshes=[];

placements.forEach(([x,y,z,ry,idx])=>{

  lm.position.set(x,y-PH/2-.15,z);lm.rotation.y=ry;scene.add(lm);

const avatars=new Map(); // id -> { group, nameSprite, targetPos, targetYaw, color }

function hexToThree(hex){
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  return new THREE.Color(r,g,b);
}

function makeNameSprite(name,color){
  const c=document.createElement('canvas');c.width=256;c.height=48;
  const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(8,7,16,0.8)';
  ctx.roundRect?ctx.roundRect(4,4,248,40,6):ctx.fillRect(4,4,248,40);
  ctx.fill();
  ctx.fillStyle=color;ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText(name,128,28);
  const tex=new THREE.CanvasTexture(c);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(1.2,0.24,1);
  return sprite;
}

function makeViewingBubble(title){
  const c=document.createElement('canvas');c.width=300;c.height=54;
  const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(212,169,106,0.15)';ctx.fillRect(0,0,300,54);
  ctx.strokeStyle='rgba(212,169,106,0.5)';ctx.lineWidth=1;ctx.strokeRect(.5,.5,299,53);
  ctx.fillStyle='rgba(212,169,106,0.9)';ctx.font='12px monospace';ctx.textAlign='center';
  ctx.fillText('👁  viewing: '+title,150,32);
  const tex=new THREE.CanvasTexture(c);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(1.5,0.27,1);
  return sprite;
}

function createAvatar(id,name,color){
  const group=new THREE.Group();
  const threeColor=hexToThree(color);

  // Body (capsule-like via cylinder + spheres)
  const bodyGeo=new THREE.CylinderGeometry(0.18,0.18,1.0,10);
  const bodyMat=new THREE.MeshStandardMaterial({color:threeColor,roughness:0.7,metalness:0.1,transparent:true,opacity:0.9});
  const body=new THREE.Mesh(bodyGeo,bodyMat);
  body.position.y=0.5; group.add(body);

  // Head
  const headGeo=new THREE.SphereGeometry(0.22,12,10);
  const headMat=new THREE.MeshStandardMaterial({color:threeColor,roughness:0.6,metalness:0.05});
  const head=new THREE.Mesh(headGeo,headMat);
  head.position.y=1.22; group.add(head);

  // Eye glow dots
  [-0.07,0.07].forEach(ex=>{
    const eg=new THREE.SphereGeometry(0.035,6,6);
    const em=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:1});
    const eye=new THREE.Mesh(eg,em);
    eye.position.set(ex,1.25,0.19); group.add(eye);
  });

  // Point light (aura)
  const aura=new THREE.PointLight(threeColor,0.8,3,2);
  aura.position.y=1; group.add(aura);

  // Name sprite
  const sprite=makeNameSprite(name,color);
  sprite.position.y=1.8; group.add(sprite);

  scene.add(group);

  const avatarObj={group,nameSprite:sprite,viewingBubble:null,
    targetPos:new THREE.Vector3(),targetYaw:0,color,name,id};
  avatars.set(id,avatarObj);
  return avatarObj;
}

function removeAvatar(id){
  const av=avatars.get(id);
  if(av){scene.remove(av.group);avatars.delete(id);}
}

function updateAvatarViewing(id,title){
  const av=avatars.get(id);if(!av)return;
  if(av.viewingBubble){av.group.remove(av.viewingBubble);av.viewingBubble=null;}
  if(title){
    const b=makeViewingBubble(title);b.position.y=2.1;
    av.group.add(b);av.viewingBubble=b;
  }
}

// Lerp avatars smoothly
function updateAvatars(dt){
  for(const [,av] of avatars){
    av.group.position.lerp(av.targetPos, Math.min(1,dt*12));
    const cy=av.group.rotation.y, ty=av.targetYaw;
    let diff=ty-cy;
    while(diff> Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    av.group.rotation.y+=diff*Math.min(1,dt*10);
  }
}

let chatOpen=false;

function addChatMsg(name,text,color,system=false){
  const msg=document.createElement('div');
  msg.className='chat-msg'+(system?' system':'');
  msg.innerHTML=system
    ?`<div class="chat-text" style="color:rgba(232,228,220,0.3);font-size:0.5rem">${text}</div>`
    :`<div class="chat-sender" style="color:${color}">${name}</div><div class="chat-text">${text}</div>`;
  chatLog.appendChild(msg);
  // Keep max 6 visible
  while(chatLog.children.length>6)chatLog.removeChild(chatLog.firstChild);
  // Auto-fade after 6s
  setTimeout(()=>{msg.style.transition='opacity 1s';msg.style.opacity='0';
    setTimeout(()=>{if(msg.parentNode)chatLog.removeChild(msg);},1000);},6000);
}

function openChat(){
  chatOpen=true;chatHint.style.display='none';chatWrap.classList.add('visible');
  document.exitPointerLock();chatInput.focus();
}
function closeChat(){
  chatOpen=false;chatWrap.classList.remove('visible');chatHint.style.display='block';
  if(started)canvas.requestPointerLock();
}
function sendChat(){
  const text=chatInput.value.trim();if(!text)return closeChat();
  ws&&ws.readyState===1&&ws.send(JSON.stringify({type:'chat',text}));
  addChatMsg(selfName,text,selfColor);
  chatInput.value='';closeChat();
}
document.getElementById('chat-send').addEventListener('click',sendChat);
chatInput.addEventListener('keydown',e=>{
  if(e.key==='Enter')sendChat();
  if(e.key==='Escape')closeChat();
  e.stopPropagation();
});

//  WEBSOCKET
// ═══════════════════════════════════════
let ws=null;
const WS_URL=`ws://${location.host}`;

function connectWS(){
  ws=new WebSocket(WS_URL);
  document.getElementById('conn-status').textContent='connecting…';

  ws.onopen=()=>{
    document.getElementById('conn-status').textContent='live';
  };

  ws.onclose=()=>{
    document.getElementById('conn-status').textContent='reconnecting…';
    setTimeout(connectWS,2000);
  };

  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    switch(msg.type){

      case 'init':
        selfId=msg.self.id;
        selfColor=msg.self.color;
        // If user provided a custom name, server still sent one; we override display only
        document.getElementById('visitor-count').textContent=msg.count+' online';
        msg.visitors.forEach(v=>{
          visitorMap.set(v.id,{name:v.name,color:v.color});
          const av=createAvatar(v.id,v.name,v.color);
          av.targetPos.set(v.x,0,v.z);av.group.position.copy(av.targetPos);
          av.targetYaw=v.yaw;
        });
        renderVisitorList();
        break;

      case 'join':
        visitorMap.set(msg.visitor.id,{name:msg.visitor.name,color:msg.visitor.color});
        createAvatar(msg.visitor.id,msg.visitor.name,msg.visitor.color);
        document.getElementById('visitor-count').textContent=msg.count+' online';
        addChatMsg('','→ '+msg.visitor.name+' entered the gallery','',true);
        renderVisitorList();
        break;

      case 'leave':
        removeAvatar(msg.id);visitorMap.delete(msg.id);
        document.getElementById('visitor-count').textContent=msg.count+' online';
        addChatMsg('','← '+msg.name+' left','',true);
        renderVisitorList();
        break;

      case 'move':
        const av=avatars.get(msg.id);
        if(av){av.targetPos.set(msg.x,0,msg.z);av.targetYaw=msg.yaw;}
        break;

      case 'viewing':
        updateAvatarViewing(msg.id,msg.title);
        if(msg.title) addChatMsg('',msg.name+' is viewing "'+msg.title+'"','',true);
        break;

      case 'chat':
        if(msg.id!==selfId) addChatMsg(msg.name,msg.text,msg.color);
        break;
    }
  };
}

  pitch=Math.max(-Math.PI/2.8,Math.min(Math.PI/2.8,pitch));
});

const raycaster=new THREE.Raycaster();
const center=new THREE.Vector2(0,0);
let hoveredPoster=null;
const infoPanel=document.getElementById('info-panel');

function checkRay(){
  raycaster.setFromCamera(center,camera);
  const hits=raycaster.intersectObjects(interactiveMeshes);
  if(hits.length>0&&hits[0].distance<4.5){
    const obj=hits[0].object;
    if(obj!==hoveredPoster){
      hoveredPoster=obj;
      if(obj.userData.isArt){
        document.getElementById('info-title').textContent=obj.userData.title;
        document.getElementById('info-artist').textContent=obj.userData.artist;
        document.getElementById('info-desc').textContent=obj.userData.desc;
        document.getElementById('info-action').textContent='[ E ] to view';
        infoPanel.classList.add('visible');
      } else if(obj.userData.isSlot){
        document.getElementById('info-title').textContent='Open Slot';
        document.getElementById('info-artist').textContent='Available';
        document.getElementById('info-desc').textContent='Submit your poster to claim this space.';
        document.getElementById('info-action').textContent='';
        infoPanel.classList.add('visible');
      }
    }
  } else {
    if(hoveredPoster){hoveredPoster=null;infoPanel.classList.remove('visible');}
  }
}

const mmC=document.getElementById('minimapCanvas');mmC.width=90;mmC.height=90;
const mmCtx=mmC.getContext('2d');
const scX=78/RW,scZ=78/RD;

function drawMinimap(){
  mmCtx.clearRect(0,0,90,90);
  mmCtx.fillStyle='rgba(10,9,20,0.85)';mmCtx.fillRect(0,0,90,90);
  mmCtx.strokeStyle='rgba(212,169,106,0.2)';mmCtx.lineWidth=1;mmCtx.strokeRect(4,4,82,82);
  // poster dots
  placements.forEach(([x,,z,,idx])=>{
    mmCtx.fillStyle=idx!==null?'rgba(212,169,106,0.5)':'rgba(255,255,255,0.1)';
    mmCtx.beginPath();mmCtx.arc(45+x*scX,45+z*scZ,2,0,Math.PI*2);mmCtx.fill();
  });
  // other avatars
  for(const [,av] of avatars){
    const ax=45+av.group.position.x*scX,az=45+av.group.position.z*scZ;
    mmCtx.fillStyle=av.color;mmCtx.beginPath();mmCtx.arc(ax,az,3,0,Math.PI*2);mmCtx.fill();
  }
  // self
  const px=45+posX*scX,pz=45+posZ*scZ;
  mmCtx.fillStyle='#e8e4dc';mmCtx.beginPath();mmCtx.arc(px,pz,3.5,0,Math.PI*2);mmCtx.fill();
  mmCtx.strokeStyle='#d4a96a';mmCtx.lineWidth=1;
  mmCtx.beginPath();mmCtx.moveTo(px,pz);mmCtx.lineTo(px+Math.sin(yaw)*9,pz+Math.cos(yaw)*9);mmCtx.stroke();
}

// ═══════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════
const clock=new THREE.Clock();
const SPEED=3.5,BX=5.5,BZN=RD/2-.5,BZP=RD/2-.8;
let hintFaded=false;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  const now=performance.now();

  if(started){
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const rgt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    const mv=new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])   mv.addScaledVector(fwd, SPEED*dt);
    if(keys['KeyS']||keys['ArrowDown']) mv.addScaledVector(fwd,-SPEED*dt);
    if(keys['KeyA']||keys['ArrowLeft']) mv.addScaledVector(rgt,-SPEED*dt);
    if(keys['KeyD']||keys['ArrowRight'])mv.addScaledVector(rgt, SPEED*dt);
    posX=Math.max(-BX,Math.min(BX,posX+mv.x));
    posZ=Math.max(-BZN,Math.min(BZP,posZ+mv.z));
    camera.position.set(posX,1.7,posZ);
    camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;

    // Send position to server throttled
    if(now-lastSend>SEND_INTERVAL&&ws?.readyState===1){
      const moved=Math.abs(posX-lastSentX)>.005||Math.abs(posZ-lastSentZ)>.005||Math.abs(yaw-lastSentYaw)>.005;
      if(moved){
        ws.send(JSON.stringify({type:'move',x:posX,y:1.7,z:posZ,yaw,pitch}));
        lastSentX=posX;lastSentZ=posZ;lastSentYaw=yaw;lastSend=now;
      }
    }

    checkRay();
    updateAvatars(dt);
    drawMinimap();

    if(!hintFaded&&clock.elapsedTime>8){
      document.getElementById('controls-hint').classList.add('fade');hintFaded=true;
    }
  }

  renderer.render(scene,camera);
}
animate();

// ═══════════════════════════════════════
//  START
// ═══════════════════════════════════════
function startExperience(){
  const inputName=document.getElementById('name-input').value.trim();
  selfName=inputName||('Visitor '+Math.floor(Math.random()*9000+1000));
  document.getElementById('my-name').textContent=selfName;
  document.getElementById('start-overlay').classList.add('gone');
  setTimeout(()=>{
    document.getElementById('start-overlay').style.display='none';
    started=true;
    canvas.requestPointerLock();
    connectWS();
  },800);
}
document.getElementById('start-btn').addEventListener('click',startExperience);
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startExperience();});
</script>
